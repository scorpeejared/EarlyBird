name: Build and Release EarlyBird

# Runs automatically whenever you push a tag like v1.0.0
# You can also trigger it manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller EarlyBird.spec

      - name: Zip the build output
        run: Compress-Archive -Path dist/EarlyBird/* -DestinationPath EarlyBird-Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EarlyBird-Windows
          path: EarlyBird-Windows.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: EarlyBird-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
